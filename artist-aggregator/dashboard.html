<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funding &amp; Open-Call Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
<!-- Generated by aggregator.py `update`. Loaded as JS (not fetch) so it works from file:// with no CORS. -->
<script src="opportunities.js"></script>
<style>
  /* ── "Kunsthaus register": stark Swiss black-on-white after Kunsthaus Hamburg.
       One grotesque (Inter Tight) at many weights; hairline black rules; black
       type pills; outlined attribute chips. A single red is reserved for
       urgency (deadline ≤ 7 days) and the NEW flag — nothing else gets color. ── */
  :root{
    --paper:#ffffff; --ink:#000000; --grey:#4c4c4c; --faint:#8f8f8f;
    --line:#000000; --line-soft:#dcdcdc;
    --red:#e30613;
  }
  :root[data-theme="dark"]{
    --paper:#0a0a0a; --ink:#ffffff; --grey:#b5b5b5; --faint:#7c7c7c;
    --line:#ffffff; --line-soft:#2e2e2e; --red:#ff3b30;
  }
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){
      --paper:#0a0a0a; --ink:#ffffff; --grey:#b5b5b5; --faint:#7c7c7c;
      --line:#ffffff; --line-soft:#2e2e2e; --red:#ff3b30;
    }
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0; background:var(--paper); color:var(--ink);
    font-family:"Inter Tight","Helvetica Neue",Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.5;
    -webkit-font-smoothing:antialiased; transition:background .3s,color .3s;}
  ::selection{background:var(--ink); color:var(--paper);}
  .wrap{max-width:1160px; margin:0 auto; padding:26px 24px 90px;}
  a{color:inherit;}

  /* ── masthead ── */
  .masthead{display:flex; justify-content:space-between; align-items:flex-end; gap:20px;
    padding-bottom:18px; border-bottom:3px solid var(--ink);}
  .eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase; font-weight:700;}
  .masthead h1{font-weight:900; font-size:clamp(38px,5.5vw,60px); line-height:.95;
    letter-spacing:-.03em; margin:10px 0 0; max-width:14ch;}
  .masthead .sub{font-size:14px; font-weight:500; color:var(--grey); margin-top:10px;}
  .mast-side{display:flex; flex-direction:column; align-items:flex-end; gap:10px; flex-shrink:0;}
  .mast-actions{display:flex; gap:8px;}
  button,.btn{font-family:inherit; cursor:pointer;
    transition:background .15s,color .15s,border-color .15s,transform .06s;}
  button:active{transform:translateY(1px);}
  .btn-solid{background:var(--ink); color:var(--paper); border:1px solid var(--ink);
    border-radius:999px; font-size:13px; font-weight:700; padding:9px 18px;}
  .btn-solid:hover{background:var(--paper); color:var(--ink);}
  .btn-ghost{background:var(--paper); border:1px solid var(--ink); color:var(--ink);
    border-radius:999px; font-size:13px; font-weight:700; padding:9px 18px;}
  .btn-ghost:hover{background:var(--ink); color:var(--paper);}
  .icon-btn{background:var(--paper); border:1px solid var(--ink); color:var(--ink); border-radius:50%;
    width:38px; height:38px; display:inline-flex; align-items:center; justify-content:center; font-size:15px;}
  .icon-btn:hover{background:var(--ink); color:var(--paper);}
  .gen{font-size:11px; font-weight:500; letter-spacing:.04em; color:var(--faint);
    text-align:right; display:flex; align-items:center; gap:6px; justify-content:flex-end;}
  .gen .dot{width:7px; height:7px; border-radius:50%; background:var(--ink); flex-shrink:0;}

  /* ── summary line ── */
  .summary{display:flex; flex-wrap:wrap; align-items:baseline; gap:6px 26px;
    font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--grey); margin:18px 0 26px;}
  .summary .su b{font-size:20px; font-weight:800; letter-spacing:0; color:var(--ink); margin-right:6px;}

  /* ── section label ── */
  .sec-label{display:flex; align-items:center; gap:16px; margin:0 0 16px;
    font-size:12px; letter-spacing:.16em; font-weight:800; text-transform:uppercase; color:var(--ink);}
  .sec-label .rule{flex:1; height:1px; background:var(--line);}

  /* ── type pill (the Kunsthaus badge) ── */
  .pill{display:inline-block; background:var(--ink); color:var(--paper); border-radius:999px;
    font-size:13px; font-weight:700; padding:6px 16px; white-space:nowrap;}

  /* ── HERO: closing-soon tiles ── */
  .hero{margin-bottom:34px;}
  .hero-tiles{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .tile{position:relative; display:block; text-decoration:none; background:var(--paper);
    border:1px solid var(--ink); padding:20px 20px 18px; overflow:hidden;
    transition:background .15s,color .15s;
    animation:rise .5s cubic-bezier(.2,.7,.2,1) backwards; animation-delay:calc(var(--i)*80ms);}
  .tile:hover{background:var(--ink); color:var(--paper);}
  .tile:hover .pill{background:var(--paper); color:var(--ink);}
  .tile:hover .tile-num,.tile:hover .tile-meta{color:inherit;}
  .tile .pill{position:absolute; top:16px; right:16px;}
  .tile-num{font-weight:900; font-size:56px; line-height:.9; letter-spacing:-.04em;
    display:flex; align-items:baseline; gap:8px;}
  .tile.u-hot .tile-num{color:var(--red);}
  .tile-unit{font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;}
  .tile-title{font-weight:800; font-style:italic; font-size:17px; line-height:1.18; margin-top:16px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
  .tile-meta{font-size:12px; font-weight:600; color:var(--grey); margin-top:10px;}
  @keyframes rise{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}

  /* ── source health strip ── */
  .health{display:flex; gap:7px 18px; flex-wrap:wrap; align-items:center;
    font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--grey);
    margin-bottom:18px; padding:10px 0; border-top:1px solid var(--line-soft); border-bottom:1px solid var(--line-soft);}
  .health .hlabel{letter-spacing:.16em; text-transform:uppercase; font-weight:800; color:var(--ink);}
  .src-chip{display:inline-flex; align-items:center; gap:6px;}
  .src-chip .sdot{width:7px; height:7px; border-radius:50%;}
  .sdot.ok{background:var(--ink);} .sdot.warn{background:var(--paper); border:1px solid var(--ink);} .sdot.bad{background:var(--red);}

  /* ── filters ── */
  .filters{display:flex; align-items:center; gap:9px 12px; flex-wrap:wrap; margin-bottom:30px;
    font-size:12px; font-weight:600; padding:14px 0;
    border-top:1px solid var(--ink); border-bottom:1px solid var(--ink);}
  .filters .flabel{letter-spacing:.16em; text-transform:uppercase; font-weight:800; margin-right:4px;}
  select,.search{font-family:inherit; font-size:12.5px; font-weight:600; background:var(--paper);
    border:1px solid var(--ink); padding:6px 9px; color:var(--ink); border-radius:0;}
  select:hover,.search:hover{background:var(--ink); color:var(--paper);}
  .search{width:150px;} .search:hover{background:var(--paper); color:var(--ink);}
  .chk{display:inline-flex; align-items:center; gap:5px; cursor:pointer; color:var(--grey);}
  .chk input{accent-color:var(--ink);}
  .reset{background:none; border:none; color:var(--ink); text-decoration:underline;
    cursor:pointer; font-family:inherit; font-size:12px; font-weight:700;}

  /* ── register rows (the Kunsthaus event table) ── */
  .list{display:flex; flex-direction:column; border-bottom:1px solid var(--ink);}
  .card{position:relative; display:grid; grid-template-columns:200px 1fr auto; gap:14px 28px;
    background:none; border-top:1px solid var(--ink); padding:24px 0 22px;}
  .card.past{opacity:.45;}
  /* left column: when / where / what you bring */
  .c-when{display:flex; flex-direction:column; align-items:flex-start; gap:2px;}
  .w-date{font-weight:800; font-size:19px; letter-spacing:-.01em; line-height:1.15;}
  .w-date.none{color:var(--faint); font-size:15px;}
  .w-days{font-weight:800; font-size:19px; letter-spacing:-.01em; line-height:1.15;}
  .w-days.u-hot{color:var(--red);}
  .w-days.past{font-size:13px; color:var(--faint); text-decoration:line-through;}
  .w-src{font-weight:700; font-size:12.5px; margin-top:6px;}
  .c-req{display:flex; gap:5px; flex-wrap:wrap; margin-top:10px;}
  .req{font-size:11px; font-weight:600; padding:3px 9px; border:1px solid var(--ink);
    border-radius:4px; color:var(--ink);}
  .req.done{background:var(--ink); color:var(--paper);}
  /* middle column */
  .c-eyebrow{font-size:10.5px; letter-spacing:.14em; font-weight:700; text-transform:uppercase;
    color:var(--grey); margin-bottom:6px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .badge-new{background:var(--red); color:#fff; border-radius:999px; padding:2px 9px;
    letter-spacing:.12em; font-weight:800;}
  .c-title{font-weight:800; font-style:italic; font-size:22px; line-height:1.15; margin:0; letter-spacing:-.015em;}
  .c-title a{text-decoration:none;} .c-title a:hover{text-decoration:underline; text-decoration-thickness:2px;}
  .c-org{font-size:13.5px; font-weight:600; margin-top:6px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .tag{font-size:11px; font-weight:600; padding:3px 9px; border:1px solid var(--ink); color:var(--ink); border-radius:4px;}
  .tag.funded{background:var(--ink); color:var(--paper);}
  .c-sum{font-size:14px; font-weight:400; color:var(--grey); margin-top:8px; max-width:66ch;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .c-foot{display:flex; justify-content:space-between; align-items:center; margin-top:14px; gap:10px; flex-wrap:wrap;}
  .status-btns{display:flex; gap:6px; flex-wrap:wrap;}
  .sbtn{font-family:inherit; font-size:12px; font-weight:600; padding:5px 12px;
    border:1px solid var(--ink); background:var(--paper); color:var(--ink); border-radius:4px;}
  .sbtn:hover{background:var(--ink); color:var(--paper);}
  .sbtn.on-int,.sbtn.on-app{background:var(--ink); color:var(--paper);}
  .sbtn.on-skip{background:var(--grey); color:var(--paper); border-color:var(--grey);}
  .src{font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink); text-decoration:none;}
  a.src:hover{text-decoration:underline;}
  /* right column: the type pill */
  .c-type{justify-self:end;}

  .empty{color:var(--faint); font-size:13px; font-weight:600; padding:26px 0;}

  /* ── expandable apply panel ── */
  .c-detail{grid-column:1/-1; border-top:1px solid var(--line-soft); margin-top:8px; padding-top:16px;
    display:flex; flex-direction:column; gap:14px;}
  .detail-text{font-size:14px; font-weight:400; color:var(--grey); line-height:1.6; max-width:78ch;
    max-height:190px; overflow:auto; padding-right:8px;}
  .d-label{font-size:10.5px; letter-spacing:.16em; font-weight:800; text-transform:uppercase;
    color:var(--ink); margin-bottom:7px;}
  .req-list{display:flex; gap:6px 9px; flex-wrap:wrap;}
  .req-check{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600;
    color:var(--ink); border:1px solid var(--ink); padding:6px 11px; border-radius:4px;
    cursor:pointer; background:var(--paper);}
  .req-check input{accent-color:var(--ink); margin:0;}
  .req-check.done{background:var(--ink); color:var(--paper); text-decoration:line-through;}
  .d-kit{display:flex; gap:7px; flex-wrap:wrap; align-items:center;}
  .copybtn,.kitlink{font-family:inherit; font-size:12px; font-weight:600; border:1px solid var(--ink);
    background:var(--paper); color:var(--ink); padding:6px 11px; border-radius:4px;
    text-decoration:none; cursor:pointer;}
  .copybtn:hover,.kitlink:hover{background:var(--ink); color:var(--paper);}
  .notes{width:100%; max-width:78ch; font-family:inherit; font-size:13.5px;
    background:var(--paper); border:1px solid var(--ink); border-radius:0; padding:9px 11px;
    color:var(--ink); resize:vertical; min-height:42px;}
  .notes::placeholder{color:var(--faint);}
  .d-actions{display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
  a.applylink{background:var(--ink); color:var(--paper); border:1px solid var(--ink); border-radius:999px;
    font-size:13px; font-weight:700; padding:9px 18px; text-decoration:none;}
  a.applylink:hover{background:var(--paper); color:var(--ink);}

  /* ── "my kit" editor ── */
  .kit{border:1px solid var(--ink); padding:18px 20px; margin-bottom:26px;}
  .kit-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:12px 0;}
  .kit-grid label{display:flex; flex-direction:column; gap:6px;
    font-size:10.5px; letter-spacing:.14em; font-weight:800; text-transform:uppercase; color:var(--ink);}
  .kit-grid .full{grid-column:1/-1;}
  .kit-grid input,.kit-grid textarea{font-family:inherit; font-size:14px; background:var(--paper);
    border:1px solid var(--ink); padding:9px 11px; color:var(--ink); border-radius:0; resize:vertical;}
  .kit-hint{font-size:12.5px; font-weight:500; color:var(--grey);}

  /* ── pagination ── */
  .pager{display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap;
    margin-top:28px; font-size:12.5px; font-weight:700;}
  .pager button{border:1px solid var(--ink); background:var(--paper); color:var(--ink);
    padding:7px 13px; min-width:38px; border-radius:0; font-family:inherit; font-weight:700;}
  .pager button:hover:not(:disabled){background:var(--ink); color:var(--paper);}
  .pager button.cur{background:var(--ink); color:var(--paper);}
  .pager button:disabled{opacity:.3; cursor:not-allowed;}
  .pager .gap{color:var(--faint); padding:0 2px;}
  .pager .pinfo{color:var(--faint); margin:0 10px; font-weight:500;}

  .footnote{font-size:12px; font-weight:500; color:var(--faint); margin-top:34px; line-height:1.65;
    border-top:1px solid var(--line-soft); padding-top:16px;}

  @media (max-width:760px){
    .hero-tiles{grid-template-columns:1fr;}
    .masthead{flex-direction:column; align-items:flex-start; gap:14px;}
    .mast-side{align-items:flex-start;} .gen{text-align:left; justify-content:flex-start;}
    .search{width:130px;}
    .card{grid-template-columns:1fr;}
    .c-when{flex-direction:row; flex-wrap:wrap; align-items:baseline; gap:4px 12px;}
    .w-src{margin-top:0;} .c-req{margin-top:2px; width:100%;}
    .c-type{justify-self:start; order:-1;}
    .kit-grid{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important; scroll-behavior:auto; animation:none!important;} }
  :focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div>
      <div class="eyebrow">Open-Call Register · multi-source · new-flagged</div>
      <h1>Funding &amp; Open Calls</h1>
      <div class="sub">Emerging visual artist · Hesse-based · Europe &amp; worldwide</div>
    </div>
    <div class="mast-side">
      <div class="mast-actions">
        <button class="btn-ghost" id="kitBtn">✎ My kit</button>
        <button class="btn-solid" id="exportBtn">↓ Export .ics</button>
        <button class="icon-btn" id="themeBtn" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
      </div>
      <div class="gen" id="gen"></div>
    </div>
  </header>

  <section class="summary" id="stats"></section>

  <section class="kit" id="kitPanel" hidden>
    <div class="d-label">My application kit</div>
    <div class="kit-hint">Saved only in this browser. Every call's Apply panel shows these with one-click copy, so you never dig for links mid-application.</div>
    <div class="kit-grid">
      <label>Portfolio URL<input id="kitPortfolio" placeholder="https://…"></label>
      <label>CV link<input id="kitCv" placeholder="https://… (Drive / Dropbox / PDF)"></label>
      <label class="full">Artist statement / short bio<textarea id="kitStatement" rows="4" placeholder="Paste the statement you usually apply with…"></textarea></label>
    </div>
    <button class="btn-solid" id="kitSave">Save kit</button>
  </section>
  <section class="hero" id="hero" hidden></section>
  <section class="health" id="health" hidden></section>

  <section class="filters" id="filters">
    <span class="flabel">Filter</span>
    <input class="search" id="fSearch" placeholder="keyword…">
    <select id="fSource"><option value="">source: all</option></select>
    <select id="fRegion"><option value="">region: all</option><option>DE</option><option>EU</option><option>Intl</option></select>
    <select id="fType"><option value="">type: all</option></select>
    <select id="fDiscipline"><option value="">discipline: all</option></select>
    <select id="fFunded"><option value="">funded: any</option><option value="likely">likely funded</option><option value="fee-based">fee-based</option><option value="mixed">mixed</option><option value="unknown">unknown</option></select>
    <select id="fWithin"><option value="">deadline: any</option><option value="14">≤ 14 days</option><option value="30">≤ 30 days</option><option value="60">≤ 60 days</option><option value="90">≤ 90 days</option></select>
    <select id="fSort"><option value="deadline">sort: soonest</option><option value="newest">sort: newest</option></select>
    <label class="chk"><input type="checkbox" id="fNew"> new only (7d)</label>
    <label class="chk"><input type="checkbox" id="fHasDl"> has deadline</label>
    <label class="chk"><input type="checkbox" id="fHideExpired" checked> hide expired</label>
    <label class="chk"><input type="checkbox" id="fHideSkip" checked> hide skipped</label>
    <button class="reset" id="resetBtn">reset</button>
  </section>

  <div class="sec-label"><span id="regLabel">The register</span><span class="rule"></span></div>
  <section class="list" id="list"></section>
  <nav class="pager" id="pager"></nav>
  <p class="footnote" id="footnote"></p>
</div>

<script>
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const DATA = (window.OPPORTUNITIES && window.OPPORTUNITIES.opportunities) || [];
const GENERATED = (window.OPPORTUNITIES && window.OPPORTUNITIES.generated) || null;
const SOURCES = (window.OPPORTUNITIES && window.OPPORTUNITIES.sources) || {};

const PAGE_SIZE = 25;
let page = 1;

let overlay = {};
try { overlay = JSON.parse(localStorage.getItem("agg:overlay") || "{}"); } catch(e){ overlay = {}; }
const saveOverlay = () => localStorage.setItem("agg:overlay", JSON.stringify(overlay));

// reusable application materials (portfolio/CV/statement) — browser-local
let kit = {};
try { kit = JSON.parse(localStorage.getItem("agg:kit") || "{}"); } catch(e){ kit = {}; }

// which cards have their apply panel open (survives re-renders, not reloads)
const openCards = new Set();

const daysLeft = d => d ? Math.round((new Date(d+"T00:00:00") - TODAY)/86400000) : null;
const isNew = o => { if(!o.first_seen) return false; return (Date.now() - new Date(o.first_seen+"Z").getTime()) < 7*864e5; };
// Kunsthaus-style date: "Fr, 18.7.2026"
const fmtDate = d => { const x=new Date(d+"T00:00:00"); return isNaN(x)? d :
  x.toLocaleDateString("de-DE",{weekday:"short"}).replace(".","")+", "+x.getDate()+"."+(x.getMonth()+1)+"."+x.getFullYear(); };
const relTime = iso => {
  if(!iso) return "";
  const s=(Date.now()-new Date(iso+"Z").getTime())/1000;
  if(s<3600) return Math.max(1,Math.round(s/60))+"m ago";
  if(s<86400) return Math.round(s/3600)+"h ago";
  return Math.round(s/86400)+"d ago";
};
// urgency ramp: klein(cool) → ochre(warm) → vermilion(hot)
const urgency = d => d===null||d<0 ? "" : d<=7 ? "u-hot" : d<=21 ? "u-warm" : "";

// ---- escaping: card/hero/health content is scraped from third-party feeds and
// this page is public, so every interpolated field is escaped and every link
// scheme-checked before it touches innerHTML. ----
const ESC = {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c=>ESC[c]);
const safeUrl = u => { const s=String(u==null?"":u).trim(); return /^https?:\/\//i.test(s) ? s : "#"; };

// ---- theme ----
const applyTheme = t => { if(t) document.documentElement.setAttribute("data-theme",t); else document.documentElement.removeAttribute("data-theme"); };
applyTheme(localStorage.getItem("agg:theme"));
document.getElementById("themeBtn").onclick = () => {
  const isDark = document.documentElement.getAttribute("data-theme")==="dark"
    || (!document.documentElement.getAttribute("data-theme") && matchMedia("(prefers-color-scheme:dark)").matches);
  const next = isDark ? "light" : "dark";
  localStorage.setItem("agg:theme", next); applyTheme(next);
};

// ---- dynamic filter options ----
[...new Set(DATA.map(o=>o.source))].sort().forEach(s=>{ const o=document.createElement("option"); o.textContent="src: "+s; o.value=s; document.getElementById("fSource").appendChild(o); });
[...new Set(DATA.map(o=>o.type))].sort().forEach(t=>{ const o=document.createElement("option"); o.textContent=t; o.value=t; document.getElementById("fType").appendChild(o); });
// disciplines are comma-joined per item; split into a flat unique set
[...new Set(DATA.flatMap(o=>(o.discipline||"").split(",").map(s=>s.trim()).filter(Boolean)))].sort()
  .forEach(d=>{ const o=document.createElement("option"); o.textContent=d; o.value=d; document.getElementById("fDiscipline").appendChild(o); });

// ---- source health strip ----
(function renderHealth(){
  const names = Object.keys(SOURCES);
  if(!names.length) return;
  const el = document.getElementById("health"); el.hidden = false;
  el.innerHTML = `<span class="hlabel">Sources</span>` + names.map(n=>{
    const v = SOURCES[n];
    const bad = typeof v!=="number", warn = v===0;
    const cls = bad?"bad":warn?"warn":"ok";
    const txt = bad ? String(v) : v+"";
    return `<span class="src-chip"><span class="sdot ${cls}"></span>${esc(n)} · ${esc(txt)}</span>`;
  }).join("");
})();

const F = () => ({
  search:document.getElementById("fSearch").value.trim().toLowerCase(),
  source:document.getElementById("fSource").value, region:document.getElementById("fRegion").value,
  type:document.getElementById("fType").value, funded:document.getElementById("fFunded").value,
  discipline:document.getElementById("fDiscipline").value,
  within:document.getElementById("fWithin").value, sort:document.getElementById("fSort").value,
  newOnly:document.getElementById("fNew").checked, hasDl:document.getElementById("fHasDl").checked,
  hideExpired:document.getElementById("fHideExpired").checked,
  hideSkip:document.getElementById("fHideSkip").checked,
});

function filtered(){
  const f = F();
  let rows = DATA.map(o=>({ ...o, dleft:daysLeft(o.deadline), _new:isNew(o), _mark:(overlay[o.id]||{}).status }));
  rows = rows
    .filter(o=> !f.search || (o.title+" "+(o.summary||"")).toLowerCase().includes(f.search))
    .filter(o=> !f.source || o.source===f.source)
    .filter(o=> !f.region || o.region===f.region)
    .filter(o=> !f.type   || o.type===f.type)
    .filter(o=> !f.discipline || (o.discipline||"").split(",").map(s=>s.trim()).includes(f.discipline))
    .filter(o=> !f.funded || o.funded===f.funded)
    .filter(o=> !f.hasDl  || o.deadline)
    .filter(o=> !f.newOnly|| o._new)
    .filter(o=> !f.within || (o.dleft!==null && o.dleft>=0 && o.dleft<=+f.within))
    .filter(o=> !(f.hideExpired && o.dleft!==null && o.dleft<0))
    .filter(o=> !(f.hideSkip && o._mark==="skip"));
  rows.sort(f.sort==="newest"
    ? (a,b)=> (b.first_seen||"").localeCompare(a.first_seen||"")
    : (a,b)=> (a.dleft===null)-(b.dleft===null) || (a.dleft??1e9)-(b.dleft??1e9));
  return rows;
}

function renderStats(){
  const total=DATA.length, newN=DATA.filter(isNew).length;
  const due=DATA.filter(o=>{const d=daysLeft(o.deadline); return d!==null&&d>=0&&d<=60;}).length;
  const fund=DATA.filter(o=>o.funded==="likely").length;
  document.getElementById("stats").innerHTML =
    `<span class="su"><b>${total}</b>in register</span>`+
    `<span class="su new"><b>${newN}</b>new · 7 days</span>`+
    `<span class="su heat"><b>${due}</b>closing ≤ 60d</span>`+
    `<span class="su fund"><b>${fund}</b>likely funded</span>`;
}

// ---- signature: closing-soon poster tiles ----
function renderHero(){
  const el = document.getElementById("hero");
  const soon = DATA
    .map(o=>({ ...o, dleft:daysLeft(o.deadline), _mark:(overlay[o.id]||{}).status }))
    .filter(o=> o.dleft!==null && o.dleft>=0 && o._mark!=="skip")
    .sort((a,b)=> a.dleft-b.dleft)
    .slice(0,3);
  if(!soon.length){ el.hidden=true; el.innerHTML=""; return; }
  el.hidden=false;
  el.innerHTML =
    `<div class="sec-label"><span>Closing soon</span><span class="rule"></span></div>`+
    `<div class="hero-tiles">`+ soon.map((o,i)=>{
      const u=urgency(o.dleft);
      return `<a class="tile ${u}" style="--i:${i}" href="${safeUrl(o.url)}" target="_blank" rel="noreferrer">
        <span class="pill">${esc(o.type)}</span>
        <div class="tile-num">${o.dleft}<span class="tile-unit">${o.dleft===1?"day":"days"}</span></div>
        <div class="tile-title">${esc(o.title)}</div>
        <div class="tile-meta">${esc(fmtDate(o.deadline))} · ${esc(o.source)}</div>
      </a>`;
    }).join("") +`</div>`;
}

function applyPanelHTML(o, id, url){
  const ov = overlay[o.id]||{}, done = ov.done||{};
  const reqs = (o.requirements||"").split(",").map(s=>s.trim()).filter(Boolean);
  const text = o.details || o.summary;
  const checklist = reqs.length
    ? `<div><div class="d-label">Apply with — check off as you prepare</div><div class="req-list">${
        reqs.map(r=>`<label class="req-check ${done[r]?"done":""}"><input type="checkbox" data-id="${id}" data-req="${esc(r)}" ${done[r]?"checked":""}>${esc(r)}</label>`).join("")
      }</div></div>`
    : `<div class="kit-hint">No application materials detected in this listing yet — check the source page.</div>`;
  const kitBtns = [
    kit.portfolio ? `<button class="copybtn" data-copy="${esc(kit.portfolio)}">⧉ portfolio link</button>` : "",
    kit.cv        ? `<button class="copybtn" data-copy="${esc(kit.cv)}">⧉ CV link</button>` : "",
    kit.statement ? `<button class="copybtn" data-copy="${esc(kit.statement)}">⧉ statement</button>` : "",
  ].join("");
  return `<div class="c-detail">
    ${text?`<div><div class="d-label">Description</div><div class="detail-text">${esc(text)}</div></div>`:""}
    ${checklist}
    <div class="d-kit"><span class="d-label" style="margin:0">My kit</span>${
      kitBtns || `<button class="kitlink kit-open">✎ set up your kit for one-click copy</button>`
    }</div>
    <textarea class="notes" data-id="${id}" placeholder="Notes for this application… (saved in this browser)">${esc(ov.notes||"")}</textarea>
    <div class="d-actions">
      <a class="applylink" href="${url}" target="_blank" rel="noreferrer">Open application page ↗</a>
      ${o.deadline?`<span class="src">deadline ${esc(fmtDate(o.deadline))}</span>`:""}
    </div>
  </div>`;
}

function cardHTML(o){
  const st=o._mark, d=o.dleft;
  const uCls = d!==null&&d>=0 ? urgency(d) : "";
  const cardCls=["card",(d!==null&&d<0?"past":""),(st==="applied"?"applied":"")].join(" ");
  const fTag=o.funded==="likely"?`<span class="tag funded">funded?</span>`:o.funded==="fee-based"?`<span class="tag fee">fee</span>`:o.funded==="mixed"?`<span class="tag fee">mixed</span>`:`<span class="tag">funding ?</span>`;
  const url=safeUrl(o.url), id=esc(o.id);
  const isOpen = openCards.has(o.id);
  const done = (overlay[o.id]||{}).done||{};
  const reqs = (o.requirements||"").split(",").map(s=>s.trim()).filter(Boolean);
  const reqChips = reqs.length
    ? `<div class="c-req">${reqs.map(r=>`<span class="req ${done[r]?"done":""}">${done[r]?"✓ ":""}${esc(r)}</span>`).join("")}</div>` : "";
  // left column: when / how long / where from — the Kunsthaus date slot
  const days = o.deadline
    ? (d<0 ? `<div class="w-days past">closed</div>`
           : `<div class="w-days ${uCls}">${d===0?"today":d+(d===1?" day":" days")+" left"}</div>`)
    : "";
  return `<article class="${cardCls}">
    <div class="c-when">
      ${o.deadline?`<div class="w-date">${esc(fmtDate(o.deadline))}</div>`:`<div class="w-date none">no deadline</div>`}
      ${days}
      <div class="w-src">${esc(o.source)}</div>
      ${!isOpen?reqChips:""}
    </div>
    <div class="c-main">
      <div class="c-eyebrow">${o._new?'<span class="badge-new">NEW</span>':''}${o.discipline?esc(o.discipline)+' · ':''}${esc(o.region)}</div>
      <h3 class="c-title"><a href="${url}" target="_blank" rel="noreferrer">${esc(o.title)}</a></h3>
      <div class="c-org">${o.org?`<span>${esc(o.org)}</span>`:""}${fTag}${o.amount?`<span class="src">◈ ${esc(o.amount)}</span>`:""}</div>
      ${!isOpen&&o.summary?`<div class="c-sum">${esc(o.summary)}</div>`:""}
      <div class="c-foot">
        <div class="status-btns">
          <button class="sbtn morebtn" data-id="${id}">${isOpen?"▴ Close":"▾ Details / Apply"}</button>
          <button class="sbtn ${st==="interested"?"on-int":""}" data-id="${id}" data-act="interested">Interested</button>
          <button class="sbtn ${st==="applied"?"on-app":""}" data-id="${id}" data-act="applied">✓ Applied</button>
          <button class="sbtn ${st==="skip"?"on-skip":""}" data-id="${id}" data-act="skip">✕ Skip</button>
        </div>
        <a class="src" href="${url}" target="_blank" rel="noreferrer">open ↗</a>
      </div>
    </div>
    <div class="c-type"><span class="pill">${esc(o.type)}</span></div>
    ${isOpen?applyPanelHTML(o,id,url):""}
  </article>`;
}

function renderPager(totalRows){
  const pages = Math.max(1, Math.ceil(totalRows/PAGE_SIZE));
  if(page>pages) page=pages;
  const el = document.getElementById("pager");
  if(pages<=1){ el.innerHTML=""; return; }
  // windowed page numbers: 1 … (p-1) p (p+1) … last
  const nums=new Set([1,pages,page,page-1,page+1]);
  const seq=[...nums].filter(n=>n>=1&&n<=pages).sort((a,b)=>a-b);
  let btns="";
  seq.forEach((n,i)=>{
    if(i && n-seq[i-1]>1) btns+=`<span class="gap">…</span>`;
    btns+=`<button class="${n===page?"cur":""}" data-page="${n}">${n}</button>`;
  });
  const from=(page-1)*PAGE_SIZE+1, to=Math.min(totalRows,page*PAGE_SIZE);
  el.innerHTML =
    `<button data-page="${page-1}" ${page<=1?"disabled":""}>‹ prev</button>` +
    btns +
    `<button data-page="${page+1}" ${page>=pages?"disabled":""}>next ›</button>` +
    `<span class="pinfo">${from}–${to} of ${totalRows}</span>`;
  el.querySelectorAll("button[data-page]").forEach(b=>b.onclick=()=>{
    page=+b.dataset.page; render(); window.scrollTo({top:0,behavior:"smooth"});
  });
}

function render(){
  renderStats();
  renderHero();
  const rows = filtered();
  // clamp BEFORE slicing so removing the last item on the last page (e.g. skip)
  // re-renders the corrected page in the same frame instead of an empty state
  const pages = Math.max(1, Math.ceil(rows.length/PAGE_SIZE));
  page = Math.min(Math.max(1, page), pages);
  const start=(page-1)*PAGE_SIZE;
  const pageRows = rows.slice(start, start+PAGE_SIZE);
  document.getElementById("regLabel").textContent = rows.length===DATA.length ? "The register" : `The register · ${rows.length} match${rows.length===1?"":"es"}`;
  document.getElementById("list").innerHTML = pageRows.map(cardHTML).join("")
    || `<div class="empty">No calls match these filters. ${DATA.length?"":"Run <code>python aggregator.py update</code> to populate."}</div>`;
  document.querySelectorAll(".sbtn[data-act]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id, act=b.dataset.act;
    overlay[id]=overlay[id]||{}; overlay[id].status = overlay[id].status===act?null:act;
    saveOverlay(); render();
  });
  document.querySelectorAll(".morebtn").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id;
    openCards.has(id) ? openCards.delete(id) : openCards.add(id);
    render();
  });
  document.querySelectorAll(".req-check input").forEach(cb=>cb.onchange=()=>{
    const id=cb.dataset.id;
    overlay[id]=overlay[id]||{}; const done=overlay[id].done=overlay[id].done||{};
    if(cb.checked) done[cb.dataset.req]=true; else delete done[cb.dataset.req];
    saveOverlay(); render();
  });
  document.querySelectorAll(".notes").forEach(t=>t.onchange=()=>{
    const id=t.dataset.id;
    overlay[id]=overlay[id]||{}; overlay[id].notes=t.value.trim();
    saveOverlay();
  });
  document.querySelectorAll(".copybtn").forEach(b=>b.onclick=()=>{
    navigator.clipboard.writeText(b.dataset.copy).then(()=>{
      const t=b.textContent; b.textContent="✓ copied";
      setTimeout(()=>{ b.textContent=t; }, 900);
    });
  });
  document.querySelectorAll(".kit-open").forEach(b=>b.onclick=()=>{
    document.getElementById("kitPanel").hidden=false;
    window.scrollTo({top:0,behavior:"smooth"});
    document.getElementById("kitPortfolio").focus();
  });
  renderPager(rows.length);
}

// filter changes reset to page 1
document.querySelectorAll("#filters select, #filters input").forEach(el=>el.addEventListener("input",()=>{ page=1; render(); }));
document.getElementById("resetBtn").onclick=()=>{
  document.querySelectorAll("#filters select").forEach(s=>s.selectedIndex=0);
  document.getElementById("fSearch").value="";
  ["fNew","fHasDl"].forEach(i=>document.getElementById(i).checked=false);
  document.getElementById("fHideExpired").checked=true;
  document.getElementById("fHideSkip").checked=true;
  page=1; render();
};

// ---- my application kit ----
(function initKit(){
  const panel=document.getElementById("kitPanel");
  const fields={portfolio:"kitPortfolio", cv:"kitCv", statement:"kitStatement"};
  Object.entries(fields).forEach(([k,id])=>{ document.getElementById(id).value = kit[k]||""; });
  document.getElementById("kitBtn").onclick=()=>{ panel.hidden=!panel.hidden; };
  document.getElementById("kitSave").onclick=()=>{
    Object.entries(fields).forEach(([k,id])=>{ kit[k]=document.getElementById(id).value.trim(); });
    localStorage.setItem("agg:kit", JSON.stringify(kit));
    panel.hidden=true; render();
  };
})();

document.getElementById("exportBtn").onclick=()=>{
  const pad=n=>String(n).padStart(2,"0"), fmt=d=>`${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}`;
  const now=fmt(new Date());
  let L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//ArtFundingAggregator//EN","CALSCALE:GREGORIAN"];
  DATA.filter(o=>o.deadline && daysLeft(o.deadline)>=0).forEach(o=>{
    const dd=new Date(o.deadline+"T00:00:00"), e=new Date(dd); e.setDate(e.getDate()+1);
    L.push("BEGIN:VEVENT",`UID:${o.id}@agg`,`DTSTAMP:${now}T000000Z`,
      `DTSTART;VALUE=DATE:${fmt(dd)}`,`DTEND;VALUE=DATE:${fmt(e)}`,
      `SUMMARY:Deadline — ${o.title}`,`DESCRIPTION:${(o.org||"")} ${(o.amount||"")} ${o.url}`,
      "BEGIN:VALARM","TRIGGER:-P14D","ACTION:DISPLAY",`DESCRIPTION:2 weeks: ${o.title}`,"END:VALARM",
      "BEGIN:VALARM","TRIGGER:-P3D","ACTION:DISPLAY",`DESCRIPTION:3 days: ${o.title}`,"END:VALARM","END:VEVENT");
  });
  L.push("END:VCALENDAR");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([L.join("\r\n")],{type:"text/calendar"}));
  a.download="art-funding-deadlines.ics"; a.click();
};

document.getElementById("gen").innerHTML = GENERATED
  ? `<span class="dot"></span>updated ${esc(relTime(GENERATED))} · ${esc(GENERATED.replace("T"," "))} UTC · auto-refreshes daily`
  : "no data yet — run: python aggregator.py update";
document.getElementById("footnote").textContent =
  "Region, type, discipline, funding tags and the “apply with” materials are heuristic guesses from each listing's (and its detail page's) text — confirm on the source page before relying on them. Deadlines are auto-parsed and may be wrong or missing. Your status marks, checklists, notes and application kit are saved only in this browser. This page reads opportunities.js, regenerated on each aggregator run.";

render();
</script>
