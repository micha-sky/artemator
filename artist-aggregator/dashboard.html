<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funding &amp; Open-Call Aggregator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Public+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<!-- Generated by aggregator.py `update`. Loaded as JS (not fetch) so it works from file:// with no CORS. -->
<script src="opportunities.js"></script>
<style>
  :root{
    --paper:#f4f4ef; --paper-2:#ecebe3; --card:#fbfbf8; --card-hover:#fff;
    --ink:#17203a; --ink-soft:#5b6478; --ink-faint:#9aa0ad;
    --line:#dcdad0; --line-2:#e8e7df;
    --patina:#3f6b5e; --patina-soft:#e5ede9;
    --signal:#b03325; --signal-soft:#f4e1dd;
    --ochre:#9a6b1f; --ochre-soft:#f0e7d5;
    --new:#2c5aa0;
    --shadow:0 1px 2px rgba(23,32,58,.04), 0 6px 18px rgba(23,32,58,.05);
  }
  :root[data-theme="dark"]{
    --paper:#14161c; --paper-2:#1b1e26; --card:#1c1f27; --card-hover:#22262f;
    --ink:#e9e9e4; --ink-soft:#a3a9b6; --ink-faint:#6b7280;
    --line:#2c313c; --line-2:#242932;
    --patina:#6bbfa6; --patina-soft:#1e2b28;
    --signal:#e0715f; --signal-soft:#33211e;
    --ochre:#d3a24e; --ochre-soft:#2e2717;
    --new:#7aa6e0;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 22px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){
      --paper:#14161c; --paper-2:#1b1e26; --card:#1c1f27; --card-hover:#22262f;
      --ink:#e9e9e4; --ink-soft:#a3a9b6; --ink-faint:#6b7280;
      --line:#2c313c; --line-2:#242932;
      --patina:#6bbfa6; --patina-soft:#1e2b28;
      --signal:#e0715f; --signal-soft:#33211e;
      --ochre:#d3a24e; --ochre-soft:#2e2717;
      --new:#7aa6e0;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 22px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:"Public Sans",system-ui,sans-serif; font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; transition:background .25s,color .25s;}
  .wrap{max-width:940px; margin:0 auto; padding:28px 20px 80px;}

  .masthead{border-bottom:2px solid var(--ink); padding-bottom:14px; margin-bottom:18px;}
  .mast-top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px;}
  .eyebrow{font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft);}
  .masthead h1{font-family:"Newsreader",serif; font-weight:600; font-size:32px; line-height:1.05; margin:6px 0 2px; letter-spacing:-.01em;}
  .masthead .sub{font-family:"Newsreader",serif; font-style:italic; font-size:15px; color:var(--ink-soft);}
  .gen{font-family:"Space Mono",monospace; font-size:10px; color:var(--ink-faint); margin-top:7px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--patina); display:inline-block;}
  .top-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;}
  button,.btn{font-family:"Public Sans",sans-serif; font-size:12.5px; font-weight:500; cursor:pointer; border-radius:0; transition:background .15s,color .15s,border-color .15s,transform .05s;}
  button:active{transform:translateY(1px);}
  .btn-solid{background:var(--ink); color:var(--paper); border:1px solid var(--ink); padding:8px 13px;}
  .btn-solid:hover{opacity:.88;}
  .icon-btn{background:transparent; border:1px solid var(--line); color:var(--ink-soft); width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;}
  .icon-btn:hover{border-color:var(--ink); color:var(--ink);}

  .stats{display:flex; border:1px solid var(--line); margin-bottom:14px; background:var(--card); box-shadow:var(--shadow);}
  .stat{flex:1; padding:11px 14px; border-right:1px solid var(--line-2);}
  .stat:last-child{border-right:0;}
  .stat .n{font-family:"Space Mono",monospace; font-size:22px; font-weight:700; line-height:1;}
  .stat .l{font-family:"Space Mono",monospace; font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-soft); margin-top:5px;}
  .stat.new .n{color:var(--new);} .stat.due .n{color:var(--signal);} .stat.fund .n{color:var(--patina);}

  /* Source health strip */
  .health{display:flex; gap:6px 14px; flex-wrap:wrap; align-items:center; font-family:"Space Mono",monospace; font-size:10px; color:var(--ink-soft); margin-bottom:14px; padding:9px 12px; border:1px solid var(--line-2); background:var(--paper-2);}
  .health .hlabel{letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint);}
  .src-chip{display:inline-flex; align-items:center; gap:5px;}
  .src-chip .sdot{width:6px; height:6px; border-radius:50%;}
  .sdot.ok{background:var(--patina);} .sdot.warn{background:var(--ochre);} .sdot.bad{background:var(--signal);}

  .filters{display:flex; align-items:center; gap:8px 10px; flex-wrap:wrap; margin-bottom:16px; font-family:"Space Mono",monospace; font-size:11px; padding:12px; border:1px solid var(--line); background:var(--card); box-shadow:var(--shadow);}
  .filters .flabel{letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin-right:2px;}
  select,.search{font-family:"Space Mono",monospace; font-size:11px; background:var(--card-hover); border:1px solid var(--line); padding:5px 8px; color:var(--ink); border-radius:0;}
  .search{width:150px;}
  .chk{display:inline-flex; align-items:center; gap:5px; cursor:pointer; color:var(--ink-soft);}
  .chk input{accent-color:var(--patina);}
  .reset{background:none; border:none; color:var(--ink-soft); text-decoration:underline; cursor:pointer; font-family:"Space Mono",monospace; font-size:10px;}

  .list{display:flex; flex-direction:column; gap:10px;}
  .card{position:relative; background:var(--card); border:1px solid var(--line); padding:15px 16px 13px 18px; box-shadow:var(--shadow); transition:background .15s,border-color .15s,transform .08s;}
  .card:hover{background:var(--card-hover); border-color:var(--ink-faint); transform:translateY(-1px);}
  .card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--line);}
  .card.f-likely::before{background:var(--patina);}
  .card.f-fee-based::before{background:var(--ochre);}
  .card.urgent::before{background:var(--signal);}
  .card.applied{box-shadow:inset 0 0 0 1px var(--patina), var(--shadow);}
  .card.past{opacity:.6;}
  .c-head{display:flex; justify-content:space-between; gap:14px; align-items:flex-start;}
  .c-eyebrow{font-family:"Space Mono",monospace; font-size:9.5px; letter-spacing:.15em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:3px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .badge-new{background:var(--new); color:#fff; padding:1px 5px; letter-spacing:.1em;}
  .c-title{font-family:"Newsreader",serif; font-weight:500; font-size:19px; line-height:1.15; margin:0;}
  .c-title a{color:var(--ink); text-decoration:none;}
  .c-title a:hover{text-decoration:underline;}
  .c-org{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .tag{font-family:"Space Mono",monospace; font-size:9px; letter-spacing:.08em; text-transform:uppercase; padding:2px 5px; border:1px solid var(--line); color:var(--ink-soft);}
  .tag.funded{color:var(--patina); border-color:var(--patina);}
  .tag.fee{color:var(--ochre); border-color:var(--ochre);}
  .dl{text-align:right; flex-shrink:0; min-width:98px;}
  .dl .date{font-family:"Space Mono",monospace; font-size:12.5px; font-weight:700;}
  .dl .days{font-family:"Space Mono",monospace; font-size:10px; color:var(--ink-soft); margin-top:1px;}
  .dl.none .date{color:var(--ink-faint);} .dl.urgent .date{color:var(--signal);} .dl.past .date{color:var(--ink-faint); text-decoration:line-through;}
  .meter{height:2px; background:var(--line-2); margin-top:6px; position:relative; overflow:hidden;}
  .meter>i{position:absolute; inset:0 auto 0 0; background:var(--ink-soft);}
  .meter.u>i{background:var(--signal);} .meter.o>i{background:var(--ochre);}
  .c-sum{font-size:12px; color:var(--ink-soft); margin-top:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .c-foot{display:flex; justify-content:space-between; align-items:center; margin-top:11px; gap:10px; flex-wrap:wrap;}
  .status-btns{display:flex; gap:6px;}
  .sbtn{font-family:"Public Sans",sans-serif; font-size:11.5px; padding:4px 9px; border:1px solid var(--line); background:transparent; color:var(--ink-soft);}
  .sbtn:hover{border-color:var(--ink); color:var(--ink);}
  .sbtn.on-int{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .sbtn.on-app{background:var(--patina); color:#fff; border-color:var(--patina);}
  .sbtn.on-skip{background:var(--ink-soft); color:#fff; border-color:var(--ink-soft);}
  .src{font-family:"Space Mono",monospace; font-size:10px; color:var(--ink-faint);}
  .empty{color:var(--ink-faint); font-family:"Space Mono",monospace; font-size:12px; padding:24px 0;}

  /* Pagination */
  .pager{display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; margin-top:22px; font-family:"Space Mono",monospace; font-size:11px;}
  .pager button{border:1px solid var(--line); background:var(--card); color:var(--ink-soft); padding:6px 11px; min-width:34px;}
  .pager button:hover:not(:disabled){border-color:var(--ink); color:var(--ink);}
  .pager button.cur{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .pager button:disabled{opacity:.4; cursor:not-allowed;}
  .pager .gap{color:var(--ink-faint); padding:0 2px;}
  .pager .pinfo{color:var(--ink-faint); margin:0 8px;}

  .footnote{font-size:11px; color:var(--ink-faint); margin-top:26px; line-height:1.6; border-top:1px solid var(--line); padding-top:14px;}
  @media (max-width:640px){ .stats{flex-wrap:wrap;} .stat{flex:1 0 50%;} .search{width:120px;} .masthead h1{font-size:26px;} }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important; scroll-behavior:auto;} }
  :focus-visible{outline:2px solid var(--patina); outline-offset:2px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div class="mast-top">
      <div>
        <div class="eyebrow">Aggregated Register · multi-source · new-flagged</div>
        <h1>Funding &amp; Open-Call Aggregator</h1>
        <div class="sub">Emerging visual artist · Hesse-based · Europe &amp; worldwide</div>
        <div class="gen" id="gen"></div>
      </div>
      <button class="icon-btn" id="themeBtn" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
    </div>
    <div class="top-actions"><button class="btn-solid" id="exportBtn">↓ Export .ics (deadlines + alerts)</button></div>
  </header>

  <section class="stats" id="stats"></section>
  <section class="health" id="health" hidden></section>

  <section class="filters" id="filters">
    <span class="flabel">Filter</span>
    <input class="search" id="fSearch" placeholder="keyword…">
    <select id="fSource"><option value="">source: all</option></select>
    <select id="fRegion"><option value="">region: all</option><option>DE</option><option>EU</option><option>Intl</option></select>
    <select id="fType"><option value="">type: all</option></select>
    <select id="fDiscipline"><option value="">discipline: all</option></select>
    <select id="fFunded"><option value="">funded: any</option><option value="likely">likely funded</option><option value="fee-based">fee-based</option><option value="mixed">mixed</option><option value="unknown">unknown</option></select>
    <select id="fWithin"><option value="">deadline: any</option><option value="14">≤ 14 days</option><option value="30">≤ 30 days</option><option value="60">≤ 60 days</option><option value="90">≤ 90 days</option></select>
    <select id="fSort"><option value="deadline">sort: soonest</option><option value="newest">sort: newest</option></select>
    <label class="chk"><input type="checkbox" id="fNew"> new only (7d)</label>
    <label class="chk"><input type="checkbox" id="fHasDl"> has deadline</label>
    <label class="chk"><input type="checkbox" id="fHideExpired" checked> hide expired</label>
    <label class="chk"><input type="checkbox" id="fHideSkip" checked> hide skipped</label>
    <button class="reset" id="resetBtn">reset</button>
  </section>

  <section class="list" id="list"></section>
  <nav class="pager" id="pager"></nav>
  <p class="footnote" id="footnote"></p>
</div>

<script>
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const DATA = (window.OPPORTUNITIES && window.OPPORTUNITIES.opportunities) || [];
const GENERATED = (window.OPPORTUNITIES && window.OPPORTUNITIES.generated) || null;
const SOURCES = (window.OPPORTUNITIES && window.OPPORTUNITIES.sources) || {};

const PAGE_SIZE = 25;
let page = 1;

let overlay = {};
try { overlay = JSON.parse(localStorage.getItem("agg:overlay") || "{}"); } catch(e){ overlay = {}; }
const saveOverlay = () => localStorage.setItem("agg:overlay", JSON.stringify(overlay));

const daysLeft = d => d ? Math.round((new Date(d+"T00:00:00") - TODAY)/86400000) : null;
const isNew = o => { if(!o.first_seen) return false; return (Date.now() - new Date(o.first_seen+"Z").getTime()) < 7*864e5; };
const fmtDate = d => { const x=new Date(d+"T00:00:00"); return isNaN(x)? d : x.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); };
const relTime = iso => {
  if(!iso) return "";
  const s=(Date.now()-new Date(iso+"Z").getTime())/1000;
  if(s<3600) return Math.max(1,Math.round(s/60))+"m ago";
  if(s<86400) return Math.round(s/3600)+"h ago";
  return Math.round(s/86400)+"d ago";
};

// ---- escaping: card/health content is scraped from third-party feeds and this
// page is public, so every interpolated field is escaped and every link scheme-
// checked before it touches innerHTML. ----
const ESC = {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c=>ESC[c]);
const safeUrl = u => { const s=String(u==null?"":u).trim(); return /^https?:\/\//i.test(s) ? s : "#"; };

// ---- theme ----
const applyTheme = t => { if(t) document.documentElement.setAttribute("data-theme",t); else document.documentElement.removeAttribute("data-theme"); };
applyTheme(localStorage.getItem("agg:theme"));
document.getElementById("themeBtn").onclick = () => {
  const isDark = document.documentElement.getAttribute("data-theme")==="dark"
    || (!document.documentElement.getAttribute("data-theme") && matchMedia("(prefers-color-scheme:dark)").matches);
  const next = isDark ? "light" : "dark";
  localStorage.setItem("agg:theme", next); applyTheme(next);
};

// ---- dynamic filter options ----
[...new Set(DATA.map(o=>o.source))].sort().forEach(s=>{ const o=document.createElement("option"); o.textContent="src: "+s; o.value=s; document.getElementById("fSource").appendChild(o); });
[...new Set(DATA.map(o=>o.type))].sort().forEach(t=>{ const o=document.createElement("option"); o.textContent=t; o.value=t; document.getElementById("fType").appendChild(o); });
// disciplines are comma-joined per item; split into a flat unique set
[...new Set(DATA.flatMap(o=>(o.discipline||"").split(",").map(s=>s.trim()).filter(Boolean)))].sort()
  .forEach(d=>{ const o=document.createElement("option"); o.textContent=d; o.value=d; document.getElementById("fDiscipline").appendChild(o); });

// ---- source health strip ----
(function renderHealth(){
  const names = Object.keys(SOURCES);
  if(!names.length) return;
  const el = document.getElementById("health"); el.hidden = false;
  el.innerHTML = `<span class="hlabel">Sources</span>` + names.map(n=>{
    const v = SOURCES[n];
    const bad = typeof v!=="number", warn = v===0;
    const cls = bad?"bad":warn?"warn":"ok";
    const txt = bad ? String(v) : v+"";
    return `<span class="src-chip"><span class="sdot ${cls}"></span>${esc(n)} · ${esc(txt)}</span>`;
  }).join("");
})();

const F = () => ({
  search:document.getElementById("fSearch").value.trim().toLowerCase(),
  source:document.getElementById("fSource").value, region:document.getElementById("fRegion").value,
  type:document.getElementById("fType").value, funded:document.getElementById("fFunded").value,
  discipline:document.getElementById("fDiscipline").value,
  within:document.getElementById("fWithin").value, sort:document.getElementById("fSort").value,
  newOnly:document.getElementById("fNew").checked, hasDl:document.getElementById("fHasDl").checked,
  hideExpired:document.getElementById("fHideExpired").checked,
  hideSkip:document.getElementById("fHideSkip").checked,
});

function filtered(){
  const f = F();
  let rows = DATA.map(o=>({ ...o, dleft:daysLeft(o.deadline), _new:isNew(o), _mark:(overlay[o.id]||{}).status }));
  rows = rows
    .filter(o=> !f.search || (o.title+" "+(o.summary||"")).toLowerCase().includes(f.search))
    .filter(o=> !f.source || o.source===f.source)
    .filter(o=> !f.region || o.region===f.region)
    .filter(o=> !f.type   || o.type===f.type)
    .filter(o=> !f.discipline || (o.discipline||"").split(",").map(s=>s.trim()).includes(f.discipline))
    .filter(o=> !f.funded || o.funded===f.funded)
    .filter(o=> !f.hasDl  || o.deadline)
    .filter(o=> !f.newOnly|| o._new)
    .filter(o=> !f.within || (o.dleft!==null && o.dleft>=0 && o.dleft<=+f.within))
    .filter(o=> !(f.hideExpired && o.dleft!==null && o.dleft<0))
    .filter(o=> !(f.hideSkip && o._mark==="skip"));
  rows.sort(f.sort==="newest"
    ? (a,b)=> (b.first_seen||"").localeCompare(a.first_seen||"")
    : (a,b)=> (a.dleft===null)-(b.dleft===null) || (a.dleft??1e9)-(b.dleft??1e9));
  return rows;
}

function renderStats(){
  const total=DATA.length, newN=DATA.filter(isNew).length;
  const due=DATA.filter(o=>{const d=daysLeft(o.deadline); return d!==null&&d>=0&&d<=60;}).length;
  const fund=DATA.filter(o=>o.funded==="likely").length;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="n">${total}</div><div class="l">Aggregated</div></div>
    <div class="stat new"><div class="n">${newN}</div><div class="l">New · 7 days</div></div>
    <div class="stat due"><div class="n">${due}</div><div class="l">Due ≤ 60d</div></div>
    <div class="stat fund"><div class="n">${fund}</div><div class="l">Likely funded</div></div>`;
}

function cardHTML(o){
  const st=o._mark, d=o.dleft;
  let dlCls="none", dateTxt="no date", daysTxt="—", meter="";
  if(o.deadline){
    dateTxt=fmtDate(o.deadline);
    if(d<0){ dlCls="past"; daysTxt="passed"; }
    else { daysTxt=d+" days"; const u=d<=14,oc=d>14&&d<=45; dlCls=u?"urgent":"";
      const pct=Math.max(4,Math.min(100,100-(d/120*100)));
      meter=`<div class="meter ${u?'u':oc?'o':''}"><i style="width:${pct}%"></i></div>`; }
  }
  const cardCls=["card","f-"+o.funded,(d!==null&&d>=0&&d<=14?"urgent":""),(d!==null&&d<0?"past":""),(st==="applied"?"applied":"")].join(" ");
  const fTag=o.funded==="likely"?`<span class="tag funded">funded?</span>`:o.funded==="fee-based"?`<span class="tag fee">fee</span>`:o.funded==="mixed"?`<span class="tag fee">mixed</span>`:`<span class="tag">funding ?</span>`;
  const url=safeUrl(o.url), id=esc(o.id);
  return `<article class="${cardCls}">
    <div class="c-head">
      <div>
        <div class="c-eyebrow">${o._new?'<span class="badge-new">NEW</span>':''}${esc(o.type)}${o.discipline?' · '+esc(o.discipline):''} · ${esc(o.region)} · <span class="src">${esc(o.source)}</span></div>
        <h3 class="c-title"><a href="${url}" target="_blank" rel="noreferrer">${esc(o.title)}</a></h3>
        <div class="c-org">${esc(o.org||"")} ${fTag} ${o.amount?`<span class="src">◈ ${esc(o.amount)}</span>`:""}</div>
      </div>
      <div class="dl ${dlCls}"><div class="date">${dateTxt}</div><div class="days">${daysTxt}</div>${meter}</div>
    </div>
    ${o.summary?`<div class="c-sum">${esc(o.summary)}</div>`:""}
    <div class="c-foot">
      <div class="status-btns">
        <button class="sbtn ${st==="interested"?"on-int":""}" data-id="${id}" data-act="interested">Interested</button>
        <button class="sbtn ${st==="applied"?"on-app":""}" data-id="${id}" data-act="applied">✓ Applied</button>
        <button class="sbtn ${st==="skip"?"on-skip":""}" data-id="${id}" data-act="skip">✕ Skip</button>
      </div>
      <a class="src" href="${url}" target="_blank" rel="noreferrer">open ↗</a>
    </div>
  </article>`;
}

function renderPager(totalRows){
  const pages = Math.max(1, Math.ceil(totalRows/PAGE_SIZE));
  if(page>pages) page=pages;
  const el = document.getElementById("pager");
  if(pages<=1){ el.innerHTML=""; return; }
  // windowed page numbers: 1 … (p-1) p (p+1) … last
  const nums=new Set([1,pages,page,page-1,page+1]);
  const seq=[...nums].filter(n=>n>=1&&n<=pages).sort((a,b)=>a-b);
  let btns="";
  seq.forEach((n,i)=>{
    if(i && n-seq[i-1]>1) btns+=`<span class="gap">…</span>`;
    btns+=`<button class="${n===page?"cur":""}" data-page="${n}">${n}</button>`;
  });
  const from=(page-1)*PAGE_SIZE+1, to=Math.min(totalRows,page*PAGE_SIZE);
  el.innerHTML =
    `<button data-page="${page-1}" ${page<=1?"disabled":""}>‹ prev</button>` +
    btns +
    `<button data-page="${page+1}" ${page>=pages?"disabled":""}>next ›</button>` +
    `<span class="pinfo">${from}–${to} of ${totalRows}</span>`;
  el.querySelectorAll("button[data-page]").forEach(b=>b.onclick=()=>{
    page=+b.dataset.page; render(); window.scrollTo({top:0,behavior:"smooth"});
  });
}

function render(){
  renderStats();
  const rows = filtered();
  // clamp BEFORE slicing so removing the last item on the last page (e.g. skip)
  // re-renders the corrected page in the same frame instead of an empty state
  const pages = Math.max(1, Math.ceil(rows.length/PAGE_SIZE));
  page = Math.min(Math.max(1, page), pages);
  const start=(page-1)*PAGE_SIZE;
  const pageRows = rows.slice(start, start+PAGE_SIZE);
  document.getElementById("list").innerHTML = pageRows.map(cardHTML).join("")
    || `<div class="empty">No calls match these filters. ${DATA.length?"":"Run <code>python aggregator.py update</code> to populate."}</div>`;
  document.querySelectorAll(".sbtn").forEach(b=>b.onclick=()=>{
    const id=b.dataset.id, act=b.dataset.act;
    overlay[id]=overlay[id]||{}; overlay[id].status = overlay[id].status===act?null:act;
    saveOverlay(); render();
  });
  renderPager(rows.length);
}

// filter changes reset to page 1
document.querySelectorAll("#filters select, #filters input").forEach(el=>el.addEventListener("input",()=>{ page=1; render(); }));
document.getElementById("resetBtn").onclick=()=>{
  document.querySelectorAll("#filters select").forEach(s=>s.selectedIndex=0);
  document.getElementById("fSearch").value="";
  ["fNew","fHasDl"].forEach(i=>document.getElementById(i).checked=false);
  document.getElementById("fHideExpired").checked=true;
  document.getElementById("fHideSkip").checked=true;
  page=1; render();
};

document.getElementById("exportBtn").onclick=()=>{
  const pad=n=>String(n).padStart(2,"0"), fmt=d=>`${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}`;
  const now=fmt(new Date());
  let L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//ArtFundingAggregator//EN","CALSCALE:GREGORIAN"];
  DATA.filter(o=>o.deadline && daysLeft(o.deadline)>=0).forEach(o=>{
    const dd=new Date(o.deadline+"T00:00:00"), e=new Date(dd); e.setDate(e.getDate()+1);
    L.push("BEGIN:VEVENT",`UID:${o.id}@agg`,`DTSTAMP:${now}T000000Z`,
      `DTSTART;VALUE=DATE:${fmt(dd)}`,`DTEND;VALUE=DATE:${fmt(e)}`,
      `SUMMARY:Deadline — ${o.title}`,`DESCRIPTION:${(o.org||"")} ${(o.amount||"")} ${o.url}`,
      "BEGIN:VALARM","TRIGGER:-P14D","ACTION:DISPLAY",`DESCRIPTION:2 weeks: ${o.title}`,"END:VALARM",
      "BEGIN:VALARM","TRIGGER:-P3D","ACTION:DISPLAY",`DESCRIPTION:3 days: ${o.title}`,"END:VALARM","END:VEVENT");
  });
  L.push("END:VCALENDAR");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([L.join("\r\n")],{type:"text/calendar"}));
  a.download="art-funding-deadlines.ics"; a.click();
};

document.getElementById("gen").innerHTML = GENERATED
  ? `<span class="dot"></span>updated ${relTime(GENERATED)} · ${GENERATED.replace("T"," ")} UTC · auto-refreshes daily`
  : "no data yet — run: python aggregator.py update";
document.getElementById("footnote").textContent =
  "Region, type and funding tags are heuristic guesses from each listing's text — confirm on the source page before relying on them. Deadlines are auto-parsed and may be wrong or missing. Your status marks are saved in this browser. This page reads opportunities.js, regenerated on each aggregator run.";

render();
</script>
</body>
</html>
